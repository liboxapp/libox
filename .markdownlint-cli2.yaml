# Configuración relajada para el wiki: evita ruido de reglas estilísticas
# sin renunciar a la detección de errores estructurales reales.
config:
  MD013: false   # longitud de línea (los docs tienen prosa larga)
  MD024:
    siblings_only: true   # permite encabezados repetidos en distintas secciones
  MD033: false   # HTML inline permitido
  MD041: false   # primera línea no necesita ser H1 (hay frontmatter YAML)
globs:
  - "**/*.md"
ignores:
  - "node_modules"
  - "CHANGELOG.md"
  - ".github"
