name: docs

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.yaml"
  push:
    branches: [main]
    paths:
      - "**/*.md"

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check local links
        uses: lycheeverse/lychee-action@v2
        with:
          # --offline valida que los links locales/relativos resuelvan,
          # sin depender de la red ni de URLs externas (evita flakiness).
          args: "--offline --no-progress 'docs/**/*.md' '*.md'"
          fail: true
